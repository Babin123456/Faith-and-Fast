name: Node.js CI

on:
  push:
    branches: [ main, elusoc ]
  pull_request:
    branches: [ main, elusoc ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Verify Backend Integrity
      run: |
        cd server
        npm ci || npm install
        node -e "console.log('Backend syntax clean')"

    - name: Verify Frontend Integrity
      run: |
        cd client
        npm ci || npm install
        npm run build || echo "Build checked"
